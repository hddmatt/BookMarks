<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收藏夹管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=system-ui,-apple-system,sans-serif" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f5;
      --sidebar-bg: #fff;
      --card-bg: #fff;
      --border: #e0e0e0;
      --primary: #2196f3;
      --primary-hover: #1976d2;
      --text: #333;
      --text-secondary: #666;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .sidebar-section { margin-bottom: 16px; }

    .sidebar-section-title {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 8px;
    }

    .category-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      color: #333;
      text-shadow: 0 0 1px rgba(255,255,255,0.5);
    }

    .category-item:hover { background: var(--bg); }
    .category-item.active { background: #e3f2fd; }

    .category-icon { font-size: 16px; }
    .category-name { flex: 1; font-size: 14px; }
    .category-count { font-size: 12px; color: var(--text-secondary); }

    .category-actions {
      display: none;
      gap: 4px;
      position: absolute;
      right: 8px;
    }

    .category-item:hover .category-actions { display: flex; }

    .category-action {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .category-action:hover { background: var(--border); color: var(--primary); }
    .category-action.delete:hover { color: #f44336; }

    .add-category-btn {
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .add-category-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .sidebar-footer button {
      flex: 1;
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sidebar-footer button:hover {
      background: var(--card-bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    .main {
      flex: 1;
      margin-left: 220px;
      padding: 24px 32px;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title { font-size: 20px; font-weight: 600; }

    .header-actions { display: flex; align-items: center; gap: 12px; }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .sort-btn {
      padding: 8px 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .sort-btn:hover, .sort-btn.active {
      border-color: var(--primary);
      color: var(--primary);
    }

    .sort-btn svg { width: 14px; height: 14px; }

    .search-box { position: relative; width: 220px; }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-primary {
      height: 48px;
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

    .btn-secondary {
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover { 
      border-color: #2563eb; 
      color: #2563eb;
    }

    .btn-danger {
      background: #f44336;
      color: #fff;
    }
    .btn-danger:hover { background: #d32f2f; }

    .favorites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .favorite-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .favorite-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--primary);
    }

    .favorite-card.sorting {
      opacity: 0.5;
      border-style: dashed;
    }

    .favorite-card.drag-over {
      border-color: var(--primary);
      background: #e3f2fd;
    }

    .drag-handle {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
      cursor: grab;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .favorite-card:hover .drag-handle { opacity: 1; }
    .drag-handle:active { cursor: grabbing; }

    .favorite-card-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .favorite-card:hover .favorite-card-actions { opacity: 1; }

    body.batch-mode .favorite-card-actions { display: none !important; }
    body.batch-mode .favorite-card.selected { background: #fffde7; border-color: #fbc02d; }

    .card-action {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      background: var(--bg);
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-action:hover { color: var(--primary); }
    .card-action.delete:hover { color: #f44336; }

    .favicon {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      margin-bottom: 12px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      line-height: 1;
    }

    .favicon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 6px;
    }

    .favicon svg {
      width: 32px;
      height: 32px;
    }

    .favicon span, .favicon .default-icon {
      font-size: 32px;
      line-height: 1;
    }

    .favicon-preview .favicon svg {
      width: 32px;
      height: 32px;
    }

    .favorite-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .favorite-url {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .favorite-categories {
      font-size: 12px;
      margin-top: 4px;
      color: var(--primary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .empty-title { font-size: 16px; margin-bottom: 8px; }
    .empty-desc { color: var(--text-secondary); font-size: 14px; }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .modal-overlay.active { opacity: 1; visibility: visible; }

    .modal {
      background: var(--sidebar-bg);
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal { transform: scale(1); }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title { font-size: 16px; font-weight: 600; }

    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .modal-close:hover { background: var(--bg); }

    .modal-body { padding: 20px; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }

    .form-input:focus { outline: none; border-color: var(--primary); }

    .form-select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }

    .emoji-picker { display: flex; flex-wrap: wrap; gap: 6px; }

    .emoji-option {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-option:hover { border-color: var(--primary); }
    .emoji-option.selected { border-color: var(--primary); background: #e3f2fd; }

    .color-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

    .color-option {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .color-option:hover { transform: scale(1.1); }
    .color-option.selected { border-color: #333; box-shadow: 0 0 0 2px #fff; }

    .favicon-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .favicon-preview .favicon {
      width: 48px;
      height: 48px;
      margin-bottom: 0;
      cursor: pointer;
      position: relative;
      font-size: 32px;
      line-height: 1;
    }

    .favicon-preview .favicon:hover::after {
      content: '编辑';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 10px;
      padding: 2px;
      text-align: center;
      border-radius: 0 0 6px 6px;
    }

    .favicon-preview-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .favicon-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .favicon-actions button {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .favicon-actions button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .upload-icon-input { display: none; }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .hamburger {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 60px 16px 24px; }
      .hamburger { display: flex; }
      .main-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .search-box { width: 100%; }
      .header-actions { width: 100%; flex-wrap: wrap; }
      .favorites-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }

    @media (max-width: 768px) {
      .sidebar-overlay.active { display: block; }
    }

    .file-input { display: none; }

    .category-checkbox-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .category-checkbox-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .category-checkbox-item:hover {
      border-color: var(--primary);
    }

    .category-checkbox-item.selected {
      border-color: var(--primary);
      background: #e3f2fd;
    }

    .category-checkbox-item.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .category-checkbox-item input {
      display: none;
    }

    .login-container {
      display: none;
      grid-template-columns: 1fr 1fr;
      width: 1050px;
      min-height: 100vh;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.1);
      margin: 0 auto;
    }

    .login-container.active {
      display: grid;
    }

    @media (max-width: 1050px) {
      .login-container {
        width: 100%;
        max-width: 800px;
      }
    }

    @media (max-width: 1024px) {
      .login-container {
        grid-template-columns: 1fr;
        max-width: 450px;
        margin: 0 auto;
      }
    }

    .login-left-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 36px;
      background: linear-gradient(145deg, #1e3a8a 0%, #1e40af 50%, #6366f1 100%);
      min-height: 100%;
      overflow: hidden;
    }

    .login-characters {
      position: relative;
      width: 550px;
      height: 400px;
      margin: 0 auto;
    }

    .login-char {
      position: absolute;
      bottom: 0;
      transition: all 0.7s ease-in-out;
      transform-origin: bottom center;
    }

    .login-purple-char {
      left: 70px;
      width: 180px;
      height: 400px;
      background: #6C3FF5;
      border-radius: 10px 10px 0 0;
      z-index: 1;
    }

    .login-black-char {
      left: 240px;
      width: 120px;
      height: 310px;
      background: #2D2D2D;
      border-radius: 8px 8px 0 0;
      z-index: 2;
    }

    .login-orange-char {
      left: 0;
      width: 240px;
      height: 200px;
      background: #FF9B6B;
      border-radius: 120px 120px 0 0;
      z-index: 3;
    }

    .login-yellow-char {
      left: 310px;
      width: 140px;
      height: 230px;
      background: #E8D754;
      border-radius: 70px 70px 0 0;
      z-index: 4;
    }

    .login-eye-container {
      position: absolute;
      display: flex;
      transition: left 0.3s ease-out, top 0.3s ease-out;
    }

    .login-eye {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: height 0.15s ease;
      background: white;
    }

    .login-pupil {
      border-radius: 50%;
      transition: transform 0.1s ease-out;
    }

    .login-pupil-dot {
      border-radius: 50%;
      transition: transform 0.1s ease-out;
    }

    .login-eye.blink {
      height: 2px !important;
    }

    .login-bg-grid {
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .login-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }

    .login-blob-1 {
      top: 25%;
      right: 25%;
      width: 256px;
      height: 256px;
      background: rgba(255,255,255,0.1);
    }

    .login-blob-2 {
      bottom: 25%;
      left: 25%;
      width: 384px;
      height: 384px;
      background: rgba(255,255,255,0.05);
    }

    .login-right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px;
      background: #f9fafb;
      min-height: 100%;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      position: relative;
      z-index: 20;
    }

    .login-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-captcha-number {
      color: #2563eb;
    }

    .login-captcha-operator {
      color: #6b7280;
      font-size: 14px;
    }

    .login-refresh-btn {
      padding: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: #6b7280;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .login-refresh-btn:hover {
      color: #374151;
      background: #f3f4f6;
    }

    .login-captcha-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .login-captcha-error.show {
      display: block;
    }

    .login-error {
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #ef4444;
      font-size: 13px;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .login-btn {
      height: 44px;
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: #1d4ed8;
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .app.hidden {
      display: none;
    }

    .btn-logout {
      background: rgba(244, 67, 54, 0.15);
      color: #dc2626;
      border: 1px solid rgba(244, 67, 54, 0.3);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: rgba(244, 67, 54, 0.25);
      border-color: #dc2626;
    }

    @media (max-width: 1024px) {
      .login-left-panel {
        display: none;
      }
      .login-right-panel {
        padding: 32px;
      }
    }

    .text-center { text-align: center; }
    .mb-10 { margin-bottom: 2.5rem; }
    .text-3xl { font-size: 1.875rem; }
    .font-bold { font-weight: 700; }
    .tracking-tight { letter-spacing: -0.025em; }
    .text-gray-900 { color: #111827; }
    .space-y-5 > * + * { margin-top: 1.25rem; }
    .space-y-2 > * + * { margin-top: 0.5rem; }
    .text-sm { font-size: 0.875rem; }
    .font-medium { font-weight: 500; }
    .text-gray-700 { color: #374151; }
    .relative { position: relative; }

  <script>
    const API_BASE = '';
    const TOKEN_KEY = 'bookmark_token';
    const USER_KEY = 'bookmark_user';

    if (!localStorage.getItem('bookmark_username')) {
      localStorage.setItem('bookmark_username', 'admin');
    }
    if (!localStorage.getItem('bookmark_password')) {
      localStorage.setItem('bookmark_password', 'admin');
    }

    async function api(endpoint, options = {}) {
      const token = localStorage.getItem(TOKEN_KEY);
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
      if (res.status === 401) {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
        checkLoginStatus();
        throw new Error('Unauthorized');
      }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function checkAuthStatus() {
      try {
        const data = await api('/api/auth/status');
        return data.registered;
      } catch (e) {
        return false;
      }
    }

    function showLoading(show) {
      let loading = document.getElementById('loadingOverlay');
      if (!loading) {
        loading = document.createElement('div');
        loading.id = 'loadingOverlay';
        loading.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;';
        loading.innerHTML = '<div style="background:#fff;padding:20px 40px;border-radius:8px;font-size:16px;">处理中...</div>';
        document.body.appendChild(loading);
      }
      loading.style.display = show ? 'flex' : 'none';
    }

    let toastTimeout = null;
    function showToast(message, duration = 3000) {
      let toast = document.getElementById('toastOverlay');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toastOverlay';
        toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:10000;opacity:0;transition:opacity 0.3s;';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.style.opacity = '1';
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.style.opacity = '0';
      }, duration);
    }

    async function loadFromServer() {
      try {
        const data = await api('/api/data');
        categories = data.categories || [];
        favorites = data.favorites || [];
        favorites = favorites.map(f => {
          if (f.categoryId && !f.categoryIds) return { ...f, categoryIds: [f.categoryId] };
          return f;

    function convertToRgba(color, alpha) {
      if (!color) return `rgba(0,0,0,${alpha})`;
      if (color.startsWith('rgba')) return color;
      if (color.startsWith('rgb')) return color.replace('rgb', 'rgba').replace(')', `,${alpha})`);
      if (color.startsWith('#')) {
        const hex = color.slice(1);
        if (hex.length === 6) {
          const r = parseInt(hex.substring(0,2), 16);
          const g = parseInt(hex.substring(2,4), 16);
          const b = parseInt(hex.substring(4,6), 16);
          return `rgba(${r},${g},${b},${alpha})`;
        }
        if (hex.length === 3) {
          const r = parseInt(hex[0] + hex[0], 16);
          const g = parseInt(hex[1] + hex[1], 16);
          const b = parseInt(hex[2] + hex[2], 16);
          return `rgba(${r},${g},${b},${alpha})`;
        }
      }
      return `rgba(0,0,0,${alpha})`;
    }

      return ids.map((id, index) => {
        const cat = categories.find(c => c.id === id);
        const color = cat?.color || defaultColors[index % defaultColors.length];
        return convertToRgba(color, 0.3);
      });
    }

    async function fetchImageAsBase64(url) {
      if (!url || url.startsWith('data:')) {
        return url;
      }
      if (!url.startsWith('http')) {
        url = 'https://' + url;
      }
      try {
        const response = await fetch(url, { mode: 'cors' });
        if (!response.ok) return null;
        const blob = await response.blob();
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(blob);
        });
      } catch (e) {
        return null;
      }
    }

                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                </svg>
              </button>

    function renderFavorites() {
      const grid = document.getElementById('favoritesGrid');
      const emptyState = document.getElementById('emptyState');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();

      let filtered = favorites;
      if (currentCategory !== 'all') {
        filtered = filtered.filter(f => isInCategory(f, currentCategory));
      }
      if (searchTerm) {
        filtered = filtered.filter(f =>
          f.title.toLowerCase().includes(searchTerm) ||
          f.url.toLowerCase().includes(searchTerm)
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      grid.innerHTML = filtered.map((fav, index) => `
        <div class="favorite-card" data-id="${escapeHtml(fav.id)}" draggable="${isSorting}" style="${isSorting ? 'cursor: grab;' : ''}">
          
          <div class="drag-handle" ${!isSorting ? 'style="display:none"' : ''}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path>
            </svg>
          </div>
          <div class="favorite-card-actions">
            <button class="card-action" onclick="event.stopPropagation(); editFavorite('${escapeHtml(fav.id)}')" title="编辑">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <button class="card-action delete" onclick="event.stopPropagation(); deleteFavorite('${escapeHtml(fav.id)}')" title="删除">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
              </svg>
            </button>
          </div>
          <div class="favicon" data-favicon="${escapeHtml(fav.favicon || '')}" data-custom-icon="${escapeHtml(fav.customIcon || '')}" data-custom-img="${escapeHtml(fav.customImg || '')}">
            ${fav.customImg ? `<img src="${escapeHtml(fav.customImg)}" alt="">` : (fav.customIcon ? fav.customIcon : (fav.favicon ? `<img src="${escapeHtml(fav.favicon)}" alt="" onerror="this.parentElement.innerHTML='${defaultIconSvg}'">` : `<span class="default-icon">${defaultIconSvg}</span>`))}
          </div>
          <div class="favorite-title">${escapeHtml(fav.title)}</div>
          <div class="favorite-url">${escapeHtml(getDomain(fav.url) || fav.url)}</div>
          <div class="favorite-categories">${getCategoryIcons(fav)}</div>
          ${getCategoryColors(fav).length > 0 ? `<div class="favorite-color-bar" style="margin-top: 8px; display: flex; gap: 4px;">
            ${getCategoryColors(fav).map(color => `<div style="width: 100%; height: 4px; border-radius: 2px; background: ${color};"></div>`).join('')}
          </div>` : ''}
        </div>
      `).join('');

      document.querySelectorAll('.favorite-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (isBatchMode) {
            if (selectedFavorites.has(card.dataset.id)) {
              selectedFavorites.delete(card.dataset.id);
              card.classList.remove('selected');
            } else {
              selectedFavorites.add(card.dataset.id);
              card.classList.add('selected');
            }
            updateSelectedCount();
          } else if (!isSorting) {
            if (!e.target.closest('.favorite-card-actions')) {
              const fav = favorites.find(f => f.id === card.dataset.id);
              if (fav) window.open(fav.url, '_blank');
            }
          }
        });

        if (isSorting) {
          card.addEventListener('dragstart', handleDragStart);
          card.addEventListener('dragend', handleDragEnd);
          card.addEventListener('dragover', handleDragOver);
          card.addEventListener('drop', handleDrop);
        }

        const faviconDiv = card.querySelector('.favicon');
        if (faviconDiv && !faviconDiv.querySelector('img[src=""]') && !faviconDiv.querySelector('.custom-icon')) {
          const img = faviconDiv.querySelector('img');
          if (img && img.src) {
            img.onerror = function() {
              faviconDiv.innerHTML = defaultIconSvg;
            };
          }
        }
      });

    function handleDragStart(e) {
      draggedItem = e.target.closest('.favorite-card');
      if (draggedItem) {
        draggedItem.classList.add('sorting');
        e.dataTransfer.effectAllowed = 'move';
      }
    }

    function handleDragEnd(e) {
      const card = e.target.closest('.favorite-card');
      if (card) card.classList.remove('sorting');
      document.querySelectorAll('.favorite-card').forEach(c => {
        c.classList.remove('drag-over');
      });
      draggedItem = null;
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const card = e.target.closest('.favorite-card');
      if (card && card !== draggedItem) {
        card.classList.add('drag-over');
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      const dropTarget = e.target.closest('.favorite-card');
      if (dropTarget && dropTarget !== draggedItem && draggedItem) {
        const dragId = draggedItem.dataset.id;
        const dropId = dropTarget.dataset.id;
        const dragIndex = favorites.findIndex(f => f.id === dragId);
        const dropIndex = favorites.findIndex(f => f.id === dropId);

        if (dragIndex !== -1 && dropIndex !== -1) {
          const [removed] = favorites.splice(dragIndex, 1);
          const insertIndex = dragIndex < dropIndex ? dropIndex - 1 : dropIndex;
          favorites.splice(insertIndex, 0, removed);
          saveData();
          renderFavorites();
        }
      }
    }

        document.getElementById('sidebar').classList.remove('open');

        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path></svg> 排序';

      document.getElementById('faviconPickerGroup').style.display = 'none';

      if (edit && editingFavoriteId) {

          document.getElementById('favoriteTitle').value = fav.title;
          document.getElementById('favoriteUrl').value = fav.url;
          selectedCategories = fav.categoryIds ? [...fav.categoryIds] : [];

          selectedCustomImg = fav.customImg || null;
        }
      } else {
        selectedCategories = [];
      }

      renderCategoryCheckboxes();

      if (!edit || !editingFavoriteId) {

        document.getElementById('favoriteUrl').value = '';

        selectedCustomImg = null;
      } else {

          if (fav.customImg) {
            document.getElementById('previewFavicon').innerHTML = `<img src="${fav.customImg}" alt="">`;
          } else if (fav.customIcon) {
            document.getElementById('previewFavicon').innerHTML = fav.customIcon;
          } else if (fav.favicon) {
            const img = document.createElement('img');
            img.src = fav.favicon;
            img.alt = '';
            img.onerror = function() {
              this.style.display = 'none';
              document.getElementById('previewFavicon').textContent = '🌍';
            };
            img.onload = function() {
              document.getElementById('previewFavicon').innerHTML = '';
              document.getElementById('previewFavicon').appendChild(img);
            };
            if (img.complete && img.naturalHeight !== 0) {
              document.getElementById('previewFavicon').innerHTML = '';
              document.getElementById('previewFavicon').appendChild(img);
            } else {
              document.getElementById('previewFavicon').textContent = '🌍';
            }
          } else {
            document.getElementById('previewFavicon').innerHTML = defaultIconSvg;

    async function exportData() {
      showLoading(true);
      try {
        const favWithBase64 = await Promise.all(favorites.map(async (fav) => {
          let base64Img = null;
          if (fav.favicon && fav.favicon.includes('google.com/s2/favicons')) {
            try {
              base64Img = await fetchImageAsBase64(fav.favicon);
            } catch (e) {
              console.log('Failed to fetch favicon for', fav.url, e.message);
            }
          }
          return { ...fav, faviconBase64: base64Img };
        }));

        const data = { categories, favorites: favWithBase64, exportedAt: new Date().toISOString() };
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bookmarks_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      } finally {
        showLoading(false);
      }
    }

    function showLoading(show) {
      let loading = document.getElementById('loadingOverlay');
      if (!loading) {
        loading = document.createElement('div');
        loading.id = 'loadingOverlay';
        loading.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;';
        loading.innerHTML = '<div style="background:#fff;padding:20px 40px;border-radius:8px;font-size:16px;">处理中...</div>';
        document.body.appendChild(loading);
      }
      loading.style.display = show ? 'flex' : 'none';
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          let data;

          if (file.name.endsWith('.html')) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const links = doc.querySelectorAll('a[href]');
            data = { categories: [], favorites: [] };
            links.forEach(link => {
              const href = link.getAttribute('href');
              try {
                if (href && (href.startsWith('http://') || href.startsWith('https://'))) {
                  const hostname = new URL(href).hostname || href;
                  data.favorites.push({
                    id: generateId(),
                    title: link.textContent || hostname,
                    url: href,
                    favicon: getFavicon(href),
                    createdAt: Date.now()
                  });
                }
              } catch (err) {}
            });
          } else {
            data = JSON.parse(text);
          }

          if (data.categories) categories = data.categories;
          if (data.favorites) {
            const existingUrls = new Map(favorites.map(f => [f.url, f]));
            const newFavorites = [];
            data.favorites.forEach(fav => {
              if (existingUrls.has(fav.url)) {
                const existing = existingUrls.get(fav.url);
                existingUrls.set(fav.url, {
                  ...existing,
                  title: fav.title || existing.title,
                  categoryIds: fav.categoryIds || existing.categoryIds,
                  favicon: (fav.faviconBase64 || fav.favicon) || existing.favicon,
                  faviconBase64: fav.faviconBase64 || existing.faviconBase64
                });
              } else {
                newFavorites.push({
                  ...fav,
                  id: generateId(),
                  favicon: fav.faviconBase64 || fav.favicon || getFavicon(fav.url),
                  createdAt: Date.now()
                });
              }
            });
            favorites = [...existingUrls.values(), ...newFavorites];
          }

          saveData();
          renderCategories();
          renderFavorites();
          alert(`导入成功：${data.favorites?.length || 0} 个网址`);
        } catch (err) {
          alert('导入失败，文件格式不正确');
        }
      };
      reader.readAsText(file);
    }

    function batchDelete() {
      if (selectedFavorites.size === 0) return;
      confirmCallback = () => {
        favorites = favorites.filter(f => !selectedFavorites.has(f.id));
        saveData();
        toggleBatchMode();
        renderFavorites();
        renderCategories();
      };
      document.getElementById('confirmText').textContent = `确定要删除选中的 ${selectedFavorites.size} 个收藏吗？`;
      document.getElementById('confirmModal').classList.add('active');
    }

    let batchSelectedEmoji = '';

    function batchEditIcon() {
      if (selectedFavorites.size === 0) return;
      batchSelectedEmoji = '';
      renderBatchEmojiPicker();
      document.getElementById('batchIconModal').classList.add('active');
    }

    function renderBatchEmojiPicker() {
      const picker = document.getElementById('batchEmojiPicker');
      picker.innerHTML = EMOJIS.map(emoji => `
        <div class="emoji-option ${emoji === batchSelectedEmoji ? 'selected' : ''}" data-emoji="${emoji}">${emoji}</div>
      `).join('');

      document.querySelectorAll('#batchEmojiPicker .emoji-option').forEach(option => {
        option.addEventListener('click', () => {
          batchSelectedEmoji = option.dataset.emoji;
          renderBatchEmojiPicker();
        });
      });
    }

    function saveBatchIcon() {
      if (!batchSelectedEmoji) { alert('请选择一个图标'); return; }
      favorites = favorites.map(f => {
        if (selectedFavorites.has(f.id)) {
          return { ...f, customIcon: batchSelectedEmoji, customImg: '' };
        }
        return f;
      });
      saveData();
      document.getElementById('batchIconModal').classList.remove('active');
      toggleBatchMode();
      renderFavorites();
    }

    let batchSelectedCategories = [];

    function openBatchCategoryModal() {
      if (selectedFavorites.size === 0) return;
      batchSelectedCategories = [];
      renderBatchCategoryList();
      document.getElementById('batchCategoryModal').classList.add('active');
    }

    function renderBatchCategoryList() {
      const container = document.getElementById('batchCategoryList');
      container.innerHTML = categories.map(cat => `
        <label style="display: flex; align-items: center; gap: 8px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer;">
          <input type="checkbox" class="batch-category-checkbox" value="${escapeHtml(cat.id)}" ${batchSelectedCategories.includes(cat.id) ? 'checked' : ''}>
          <span>${cat.icon} ${escapeHtml(cat.name)}</span>
        </label>
      `).join('');

      document.querySelectorAll('.batch-category-checkbox').forEach(cb => {
        cb.addEventListener('change', (e) => {
          if (e.target.checked) {
            if (batchSelectedCategories.length < 3) {
              batchSelectedCategories.push(e.target.value);
            } else {
              e.target.checked = false;
              alert('最多选择3个分类');
            }
          } else {
            batchSelectedCategories = batchSelectedCategories.filter(id => id !== e.target.value);
          }
        });
      });
    }

    function saveBatchCategory() {
      if (batchSelectedCategories.length === 0) {
        alert('请至少选择一个分类');
        return;
      }
      favorites = favorites.map(f => {
        if (selectedFavorites.has(f.id)) {
          return { ...f, categoryIds: [...batchSelectedCategories] };
        }
        return f;
      });
      saveData();
      document.getElementById('batchCategoryModal').classList.remove('active');
      toggleBatchMode();
      renderFavorites();
    }

    document.getElementById('batchManageBtn').addEventListener('click', toggleBatchMode);
    document.getElementById('batchCancelBtn').addEventListener('click', toggleBatchMode);
    document.getElementById('batchDeleteBtn').addEventListener('click', batchDelete);
    document.getElementById('batchEditIconBtn').addEventListener('click', batchEditIcon);
    document.getElementById('batchSetCategoryBtn').addEventListener('click', openBatchCategoryModal);
    document.getElementById('batchCategoryModalClose').addEventListener('click', () => document.getElementById('batchCategoryModal').classList.remove('active'));
    document.getElementById('batchCategoryModalCancel').addEventListener('click', () => document.getElementById('batchCategoryModal').classList.remove('active'));
    document.getElementById('batchCategoryModalSave').addEventListener('click', saveBatchCategory);

    let isAllSelected = false;
    document.getElementById('selectAllBtn').addEventListener('click', () => {
      isAllSelected = !isAllSelected;
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      let filtered = favorites;
      if (currentCategory !== 'all') {
        filtered = filtered.filter(f => isInCategory(f, currentCategory));
      }
      if (searchTerm) {
        filtered = filtered.filter(f =>
          f.title.toLowerCase().includes(searchTerm) ||
          f.url.toLowerCase().includes(searchTerm)
        );
      }
      if (isAllSelected) {
        filtered.forEach(f => selectedFavorites.add(f.id));
        document.querySelectorAll('.favorite-card').forEach(card => {
          if (filtered.some(f => f.id === card.dataset.id)) {
            card.classList.add('selected');
          }
        });
        document.getElementById('selectAllBtn').textContent = '取消全选';
      } else {
        selectedFavorites.clear();
        document.querySelectorAll('.favorite-card').forEach(card => card.classList.remove('selected'));
        document.getElementById('selectAllBtn').textContent = '全选';
      }
      updateSelectedCount();
    });

    document.getElementById('favoriteModalClose').addEventListener('click', closeFavoriteModal);
    document.getElementById('favoriteModalCancel').addEventListener('click', closeFavoriteModal);
    document.getElementById('favoriteModalSave').addEventListener('click', saveFavorite);
    document.getElementById('previewFavicon').addEventListener('click', () => document.getElementById('uploadIconInput').click());
    document.getElementById('uploadIconBtn').addEventListener('click', () => document.getElementById('uploadIconInput').click());
    document.getElementById('selectEmojiBtn').addEventListener('click', showEmojiPicker);
    document.getElementById('autoFaviconBtn').addEventListener('click', useAutoFavicon);
    document.getElementById('uploadIconInput').addEventListener('change', handleIconUpload);

    document.getElementById('addCategoryBtn').addEventListener('click', () => openCategoryModal(false));
    document.getElementById('categoryModalClose').addEventListener('click', closeCategoryModal);
    document.getElementById('categoryModalCancel').addEventListener('click', closeCategoryModal);
    document.getElementById('categoryModalSave').addEventListener('click', saveCategory);

    document.getElementById('confirmModalClose').addEventListener('click', closeConfirmModal);
    document.getElementById('confirmModalCancel').addEventListener('click', closeConfirmModal);
    document.getElementById('confirmModalConfirm').addEventListener('click', () => { if (confirmCallback) confirmCallback(); closeConfirmModal(); });

    document.getElementById('batchIconModalClose').addEventListener('click', () => document.getElementById('batchIconModal').classList.remove('active'));
    document.getElementById('batchIconModalCancel').addEventListener('click', () => document.getElementById('batchIconModal').classList.remove('active'));
    document.getElementById('batchIconModalSave').addEventListener('click', saveBatchIcon);

    document.getElementById('searchInput').addEventListener('input', renderFavorites);
    document.getElementById('sortBtn').addEventListener('click', toggleSortMode);

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('active');
    });
    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    });

    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', (e) => { if (e.target.files[0]) importData(e.target.files[0]); });

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeFavoriteModal(); closeCategoryModal(); closeConfirmModal(); } });

    ['favoriteModal', 'categoryModal', 'confirmModal'].forEach(id => {
      document.getElementById(id).addEventListener('click', (e) => { if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('active'); });
    });

    renderCategories();
    renderFavorites();
  </script>
</body>
</html>
